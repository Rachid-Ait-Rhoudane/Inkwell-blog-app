services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: crud-app
    container_name: crud_app_server
    volumes:
      - .:/var/www/html
      - crud_app_storage:/var/www/html/storage
      - crud_app_cache:/var/www/html/bootstrap/cache
    working_dir: /var/www/html
    restart: unless-stopped
    user: www-data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DOCKER_MYSQL_DATABASE}
      MYSQL_USER: ${DOCKER_MYSQL_USER}
      MYSQL_PASSWORD: ${DOCKER_MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DOCKER_MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD}
    restart: unless-stopped
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - crud_app_storage:/var/www/html/storage
      - crud_app_cache:/var/www/html/bootstrap/cache
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

  node:
    image: node:24-alpine
    container_name: crud_app_front
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host"

      - "5173:5173"
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - crud_app_storage:/var/www/html/storage
      - crud_app_cache:/var/www/html/bootstrap/cache
      - node_modules:/var/www/html/node_modules

volumes:
  db_data:
  node_modules:
  crud_app_storage:
  crud_app_cache:
